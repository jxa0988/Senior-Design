name: Django Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      GOOGLE_CLIENT_ID: "ci-dummy-google-client-id"
      GOOGLE_CLIENT_SECRET: "ci-dummy-google-client-secret"
      GOOGLE_REDIRECT_URI: "http://localhost:8000"
      SECRET_KEY: "ci-not-a-real-secret-key-change-me"

      DB_NAME: test_db
      DB_USER: postgres
      DB_PASS: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (uv)
        run: |
          python -m pip install --upgrade pip uv
          uv sync --dev

      - name: Run migrations
        run: |
          cd backend
          uv run python manage.py migrate --noinput

      - name: Run tests (JUnit + Coverage)
        run: |
          cd backend
          uv run pytest -vv \
            --junitxml=report.xml \
            --cov=core \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Publish test results to GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Django Tests
          path: backend/report.xml
          reporter: java-junit

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: backend/report.xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml

      - name: Upload HTML coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage
          path: backend/htmlcov/

      # Optional: Codecov (may require a token for private repos)
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          # token: ${{ secrets.CODECOV_TOKEN }}
